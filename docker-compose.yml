services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery
      POSTGRES_DB: bakery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    profiles: ["full"]
    build: ./backend
    env_file: .env
    depends_on: [postgres, redis]
    ports:
      - "8000:8000"

  agent:
    profiles: ["full"]
    build: ./agent
    env_file: .env
    depends_on: [postgres, redis, backend]

  frontend:
    profiles: ["full"]
    build: ./frontend
    env_file: .env
    depends_on: [backend]
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
