worker_processes auto;
events { worker_connections 2048; }

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Minimal log format that surfaces upstream timing for debugging.
  log_format main '$remote_addr "$request" $status '
                  'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;

  # Voice upload (POST /api/voice/upload) carries small audio blobs.
  client_max_body_size 25m;

  upstream frontend { server frontend:3000; keepalive 32; }
  upstream backend  { server backend:8000;  keepalive 32; }

  server {
    listen 80 default_server;
    server_name _;

    # ---- Backend API ----
    # Matches /api/*, /healthz, /docs, /openapi.json, /redoc.
    location ~ ^/(api|healthz|docs|openapi\.json|redoc) {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      # SSE / streaming responses (/api/chat, /api/events, /api/alerts).
      # Without these, NGINX buffers the whole response and the chat looks frozen.
      proxy_buffering   off;
      proxy_cache       off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      chunked_transfer_encoding on;
    }

    # ---- Frontend (Next.js) ----
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_read_timeout 300s;
    }
  }
}
