# Alembic configuration for BakeryPilot.
#
# Schema management is dual-source by design:
#   - infra/supabase/schema.sql is the v0 baseline applied by Postgres's
#     init-dir on a fresh volume (and by CD when schema.sql itself changes).
#   - Alembic owns ongoing incremental changes from that baseline forward.
#
# The DB URL is supplied at runtime via the DATABASE_URL env var
# (see alembic/env.py). Do not hardcode credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s

# DB URL is set by env.py from $DATABASE_URL. Leave blank.
sqlalchemy.url =

[post_write_hooks]
# (none)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
