# This data has no public machine-readable source. Manufacturing line
# layouts and capacities are internal operations data not published by
# any company. The values below are engineering-judgment configuration
# for demo realism only -- every row carries
# `source: engineering_judgment_demo_only`
# so observers can audit-trail it as non-real.
#
# Schema target: production_lines (line_id, facility_id, name,
# capacity_kg_per_hour, supported_allergen_tags). FK requires the row's
# facility_id to exist; seed_toronto_facilities.py runs first.

