# Bill of materials per SKU (3-6 ingredients each).
#
# This data has no public machine-readable source. Production recipes
# are proprietary trade secrets; no public API or website publishes the
# exact gram-per-unit ingredient ratios for ACE Bakery / Stonefire /
# Wonder / D'Italiano / Country Harvest / Casa Mendosa SKUs. The values
# below are engineering-judgment proxies calibrated against:
#   - Each SKU's published net weight (e.g. ACE baguette ~250g, Wonder
#     loaf ~675g). Pre-bake dough mass exceeds finished mass by ~12-18%
#     (water lost during proof + bake), so kg_per_unit values are
#     deliberately set BELOW retail pack weight.
#   - Standard bakery formulas from public references (King Arthur,
#     industry training manuals) for ratios of flour : yeast : salt :
#     water : fat.
#
# Every row carries `source: engineering_judgment_demo_only` so observers
# can audit-trail it as non-real.
#
# Schema target: production_formulas (sku_id, ingredient_id, kg_per_unit).
# FKs require both the sku_id and ingredient_id to exist; seed.sql seeds
# both before this YAML is loaded.

