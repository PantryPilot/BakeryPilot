name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: backend-venv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: backend-venv-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -v
        env:
          DATABASE_URL: ""
          ANTHROPIC_API_KEY: "test-key"

  agent-tests:
    name: Agent (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: agent/.venv
          key: agent-venv-${{ hashFiles('agent/uv.lock') }}
          restore-keys: agent-venv-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -v

  frontend-tests:
    name: Frontend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
